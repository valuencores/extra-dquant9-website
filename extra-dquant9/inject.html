const TARGET = 8006964;

async function run(){
  // 1) 기존 데이터 완전 삭제
  L('▶ 기존 데이터 삭제 중...', 'info');
  let deleted = 0;
  while(true){
    const r = await fetch(`${API}?limit=100`);
    const j = await r.json();
    if(!j.data || j.data.length === 0) break;
    for(const row of j.data){
      await fetch(`${API}/${row.id}`, {method:'DELETE'});
      deleted++;
    }
  }
  L(`✅ 기존 ${deleted}건 삭제 완료`, 'ok');

  // 2) 108건 순서대로 주입
  L('▶ 108건 주입 시작...', 'info');
  let cum = 0, ok = 0, fail = 0;
  for(let i = 0; i < ALL.length; i++){
    const row = ALL[i];
    cum += row.amt;
    try {
      const r = await fetch(API, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          record_date: row.d,
          title:       row.note,
          total_asset: row.amt,
          dq9_amount:  cum,
          account:     row.acc,
          memo:        row.note
        })
      });
      if(r.ok){ ok++; }
      else { fail++; L(`❌ ${i+1}. ${row.note} FAIL ${r.status}`, 'err'); }
    } catch(e){ fail++; L(`❌ ${i+1}. ERROR: ${e}`, 'err'); }
  }

  // 3) 최종 검증
  const check = await (await fetch(`${API}?limit=1`)).json();
  L('', '');
  L(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  L(`✅ 성공: ${ok}건  ❌ 실패: ${fail}건`, ok===ALL.length?'ok':'warn');
  L(`💰 최종 누적: ${cum.toLocaleString()}원`, 'ok');
  L(`🎯 목표:      ${TARGET.toLocaleString()}원`, 'info');
  L(cum === TARGET ? '🎉 정확히 일치!' : `⚠️ 차이: ${(cum-TARGET).toLocaleString()}원`, cum===TARGET?'ok':'err');
  L(`📊 DB 총 레코드: ${check.total}건`, 'info');
  console.log(`DONE ok=${ok} fail=${fail} cum=${cum} total=${check.total}`);
}

run().catch(e => L('FATAL ERROR: '+e, 'err'));
